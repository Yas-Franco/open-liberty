# Include standard test port definitions
bootstrap.include=../testports.properties

# Enable detailed trace logging for OAuth/OIDC components
# This helps debug metadata endpoint behavior and configuration matching
com.ibm.ws.logging.trace.specification=*=info:\
com.ibm.ws.security.openidconnect.client*=all:\
com.ibm.ws.security.authentication.filter*=all:\
com.ibm.ws.security.oauth*=all

# Disable log file size limits for FAT tests
com.ibm.ws.logging.max.file.size=0