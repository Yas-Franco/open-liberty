mcpServer.name=Model Context Protocol (MCP) Server
mcpServer.description=Configure the MCP Server feature.

stateless.name=Stateless mode
stateless.description=Stateless mode disables MCP session tracking by the server. This mode removes the need for session affinity in a clustered environment. Otherwise, the same server handles requests from the same MCP session. Because no session data is stored on the servers, any server instance can handle any request, which simplifies load balancing and horizontal scaling. However, the stateless mode also disables MCP features that rely on session tracking or linking separate HTTP requests together, such as canceling a tool call.

moduleName.name=Module name
moduleName.description=The name of the module in an EAR. Selects the module to which the configuration applies.

path.name=Endpoint path
path.description=The URL path for this MCP endpoint, relative to the module context root. Sets the MCP endpoint path within that module.

info.name=MCP Server Information
info.description=Configuration for MCP server metadata that is returned to clients during initialization.

info.name.name=Server name
info.name.description=The name identifier for this MCP server. This display name is used by MCP clients to identify the server.

info.title.name=Server title
info.title.description=A human-readable title for this MCP server, intended for UI and end-user contexts.

info.version.name=Server version
info.version.description=The version string for this MCP server. This value is used to track the server version.

info.description.name=Server description
info.description.description=The description string for this MCP server. This value describes the purpose and capabilities of the implementation for clients or servers.